services:

  # ── Kafka (KRaft mode, no ZooKeeper) ──────────────────────────────────────
  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:29092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible object store) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Creates the iceberg-warehouse bucket on first boot
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/iceberg-warehouse &&
        echo 'Bucket ready.'
      "

  # ── Nessie Catalog ────────────────────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.5
    container_name: nessie
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      QUARKUS_MANAGEMENT_PORT: 9002
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      NESSIE_VERSION_STORE_PERSIST_ROCKS_DB_DATABASE_PATH: /nessie/data
      # Warehouse name + location use a properties file (hyphens in names are
      # ambiguous as env vars). S3 credentials stay as env vars (no ambiguity).
      QUARKUS_CONFIG_LOCATIONS: /nessie/config/nessie.properties
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000/
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY: "urn:nessie-secret:quarkus:nessie.catalog.secrets.minio"
      NESSIE_CATALOG_SECRETS_MINIO_NAME: minioadmin
      NESSIE_CATALOG_SECRETS_MINIO_SECRET: minioadmin
    volumes:
      - ./docker/nessie/data:/nessie/data
      - ./docker/nessie/nessie.properties:/nessie/config/nessie.properties:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Flink JobManager ──────────────────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./docker/flink
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 30000
    depends_on:
      nessie:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 5s
      retries: 20

  # ── Flink TaskManager ─────────────────────────────────────────────────────
  flink-taskmanager:
    build:
      context: ./docker/flink
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 30000

  # ── Flink SQL Job (submits the SQL job then exits) ────────────────────────
  flink-sql-job:
    build:
      context: ./docker/flink
    container_name: flink-sql-job
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nessie:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
    volumes:
      - ./sql:/sql
    command: >
      /bin/bash -c "
        echo 'Waiting for TaskManager to register...' &&
        sleep 20 &&
        /opt/flink/bin/sql-client.sh -f /sql/kafka_to_iceberg.sql
      "

  # ── Jupyter Lab (DuckDB + Iceberg queries) ───────────────────────────────
  jupyter:
    build:
      context: ./docker/jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    depends_on:
      nessie:
        condition: service_healthy
    volumes:
      - ./docker/jupyter/notebooks:/home/jupyter
    networks:
      - default

  # ── Evidence BI (dashboard) ───────────────────────────────────────────────
  evidence:
    build:
      context: ./docker/evidence
    container_name: evidence
    ports:
      - "3000:3000"
    depends_on:
      nessie:
        condition: service_healthy

  # ── Kafka producer (Python, sends synthetic events) ───────────────────────
  kafka-producer:
    build:
      context: ./docker/producer
    container_name: kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EVENTS_PER_SECOND: "2"